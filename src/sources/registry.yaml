# Chronicle source registry.
# trust:    0.0 - 1.0, used in final scoring. Tune by eyeballing output.
# kind_hint: rough prior on what this source publishes. Used as a tiebreaker
#           when the LLM classifier is uncertain. Optional.
# limit:    max items to fetch per run. Keeps cost predictable.
# url_include/url_exclude: optional substring filters for sitemap sources.

sources:
  # ── Research ────────────────────────────────────────────────────────────
  - id: arxiv_cl
    name: arXiv cs.CL
    type: rss
    url: https://rss.arxiv.org/rss/cs.CL
    trust: 0.90
    kind_hint: paper
    limit: 30

  - id: arxiv_lg
    name: arXiv cs.LG
    type: rss
    url: https://rss.arxiv.org/rss/cs.LG
