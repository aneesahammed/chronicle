name: Refresh Chronicle

on:
  schedule:
    - cron: "0 9,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: pages
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check Chronicle
        run: npm run check

      - name: Refresh Chronicle feed
        timeout-minutes: 15
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: npm run run:pipeline

      - name: Verify Chronicle feed
        run: npm run verify:feed

      - name: Commit Chronicle feed
        run: |
          git config user.name "chronicle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add \
            data/history.json \
            public/feed.json \
            public/daily \
            public/robots.txt \
            public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No Chronicle feed changes."
            exit 0
          fi
          unexpected="$(git diff --cached --name-only | grep -Ev '^(data/history\.json|public/feed\.json|public/daily/index\.json|public/daily/[0-9]{4}-[0-9]{2}-[0-9]{2}/feed\.json|public/robots\.txt|public/sitemap\.xml)$' || true)"
          if [ -n "$unexpected" ]; then
            echo "::error::Unexpected files staged for Chronicle feed commit:"
            printf '%s\n' "$unexpected"
            exit 1
          fi
          unstaged="$(git diff --name-only)"
          if [ -n "$unstaged" ]; then
            echo "::error::Unexpected unstaged files after Chronicle feed refresh:"
            printf '%s\n' "$unstaged"
            exit 1
          fi
          git commit -m "feed: chronicle $(date -u +%Y-%m-%dT%H:%MZ)"
          if ! git pull --rebase origin pages; then
            echo "::error::Could not rebase Chronicle feed commit onto origin/pages. Aborting rebase."
            git status --short
            git rebase --abort || true
            exit 1
          fi
          git push origin HEAD:pages

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
